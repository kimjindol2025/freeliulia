<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦎 FreeLiulia Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans CJK KR', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        textarea {
            width: 100%;
            height: 100%;
            border: none;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            color: #333;
            background: #f8f8f8;
            padding: 12px;
        }

        .output {
            background: #1e1e1e;
            color: #00ff00;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-top: 1px solid #ddd;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .examples {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .example-btn {
            padding: 8px 12px;
            background: #e8e8ff;
            border: 1px solid #667eea;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-align: left;
            transition: all 0.2s ease;
        }

        .example-btn:hover {
            background: #d5d9ff;
            transform: translateX(4px);
        }

        .highlight {
            background: #fff9e6;
            border-left: 3px solid #ffc107;
            padding: 10px;
            border-radius: 4px;
            margin: 8px 0;
            font-size: 12px;
            line-height: 1.4;
        }

        .error {
            background: #ffebee;
            border-left: 3px solid #f44336;
            padding: 10px;
            border-radius: 4px;
            color: #c62828;
            font-size: 12px;
        }

        .success {
            background: #e8f5e9;
            border-left: 3px solid #4caf50;
            padding: 10px;
            border-radius: 4px;
            color: #2e7d32;
            font-size: 12px;
        }

        .title {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .panel {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="title">🦎 FreeLiulia Playground</div>
    <div class="subtitle">한글 프로그래밍 언어 온라인 에디터</div>

    <div class="container">
        <!-- 입력 패널 -->
        <div class="panel">
            <div class="header">
                📝 FreeLiulia 코드
                <span id="charCount">0자</span>
            </div>
            <div class="content">
                <textarea id="codeEditor" placeholder="여기에 FreeLiulia 코드를 입력하세요...

예제:
변수 숫자 = 42
변수 텍스트 = &quot;안녕하세요&quot;
변수 합 = 길이(텍스트)
"></textarea>
            </div>
            <div class="buttons">
                <button class="btn-primary" onclick="compileCode()">▶ 컴파일</button>
                <button class="btn-secondary" onclick="loadExample(0)">예제 1</button>
                <button class="btn-danger" onclick="clearCode()">🗑 지우기</button>
            </div>
        </div>

        <!-- 출력 패널 -->
        <div class="panel">
            <div class="header">
                📊 컴파일 결과
            </div>
            <div class="content">
                <div id="output" class="output">컴파일 결과가 여기에 표시됩니다...</div>
            </div>
            <div class="buttons">
                <button class="btn-secondary" onclick="loadExample(1)">예제 2</button>
                <button class="btn-secondary" onclick="loadExample(2)">예제 3</button>
                <button class="btn-secondary" onclick="copyOutput()">📋 복사</button>
            </div>
        </div>
    </div>

    <script>
        // 코드 에디터
        const codeEditor = document.getElementById('codeEditor');
        const output = document.getElementById('output');
        const charCount = document.getElementById('charCount');

        // 문자 수 계산
        codeEditor.addEventListener('input', () => {
            charCount.textContent = codeEditor.value.length + '자';
        });

        // 예제 코드
        const examples = [
            `# 기본 변수
변수 이름 = "FreeLiulia"
변수 버전 = 1.0
변수 활성 = 참

# 함수
함수 인사(이름: 문자열) -> 문자열
    변수 메시지 = "안녕하세요, " + 이름
    반환 메시지
끝

# 결과
변수 결과 = 인사("사용자")`,

            `# 문자열 처리
변수 텍스트 = "FreeLiulia"
변수 크기 = 길이(텍스트)
변수 대문 = 대문자(텍스트)
변수 소문 = 소문자(텍스트)

# 반복 및 채우기
변수 구분선 = 반복("=", 10)
변수 패딩 = 채우기("프로그래밍", 15)`,

            `# 배열 작업
변수 점수 = [85, 90, 78, 92, 88]
변수 합계 = 배열합계(점수)
변수 평균 = 배열평균(점수)
변수 최고 = 배열최대(점수)
변수 최저 = 배열최소(점수)

# 조건문
만약 평균 >= 80
    변수 등급 = "우수"
아니면만약 평균 >= 70
    변수 등급 = "양호"
아니면
    변수 등급 = "미흡"
끝`
        ];

        // 코드 컴파일 (시뮬레이션)
        function compileCode() {
            const code = codeEditor.value;

            if (!code.trim()) {
                showOutput('<error>오류: 코드가 비어있습니다</error>', 'error');
                return;
            }

            try {
                // 기본 문법 검사
                if (!validateSyntax(code)) {
                    return;
                }

                // 컴파일 시뮬레이션
                const result = simulateCompilation(code);
                showOutput(result, 'success');
            } catch (e) {
                showOutput(`오류: ${e.message}`, 'error');
            }
        }

        // 문법 검사
        function validateSyntax(code) {
            const keywords = ['함수', '변수', '만약', '반복', '끝', '반환'];
            let hasValidLine = false;

            for (const line of code.split('\n')) {
                const trimmed = line.trim();
                if (trimmed && !trimmed.startsWith('#')) {
                    if (keywords.some(kw => trimmed.includes(kw))) {
                        hasValidLine = true;
                    }
                }
            }

            if (!hasValidLine) {
                showOutput('<highlight>⚠️ 경고: 유효한 키워드를 찾을 수 없습니다</highlight>', 'warning');
            }

            return true;
        }

        // 컴파일 시뮬레이션
        function simulateCompilation(code) {
            let result = '✅ 컴파일 성공!\n\n';
            result += '📊 분석 결과:\n';
            result += '─────────────────────────\n';

            // 줄 수 카운트
            const lines = code.split('\n').filter(l => l.trim()).length;
            result += `총 ${lines}줄 분석됨\n`;

            // 키워드 카운트
            const 함수 = (code.match(/함수\s/g) || []).length;
            const 변수 = (code.match(/변수\s/g) || []).length;
            const 만약 = (code.match(/만약\s/g) || []).length;
            const 반복 = (code.match(/반복\s|동안\s/g) || []).length;

            if (함수 > 0) result += `함수: ${함수}개\n`;
            if (변수 > 0) result += `변수: ${변수}개\n`;
            if (만약 > 0) result += `조건: ${만약}개\n`;
            if (반복 > 0) result += `반복: ${반복}개\n`;

            // 추출된 변수 보여주기
            const varMatches = code.match(/변수\s([가-힣_]\w*)/g) || [];
            if (varMatches.length > 0) {
                result += '\n📋 인식된 변수:\n';
                const vars = new Set(varMatches.map(v => v.replace('변수 ', '')));
                vars.forEach(v => result += `  - ${v}\n`);
            }

            result += '\n✨ 컴파일 완료!\n';
            result += '💡 팁: 실제 컴파일은 프로젝트 저장소에서 수행하세요.';

            return result;
        }

        // 출력 표시
        function showOutput(text, type) {
            let formatted = text;

            if (type === 'error') {
                formatted = `<span style="color: #ff6b6b;">❌ ${text}</span>`;
            } else if (type === 'success') {
                formatted = text;
            } else if (type === 'warning') {
                formatted = text;
            }

            output.innerHTML = formatted;
        }

        // 예제 로드
        function loadExample(index) {
            codeEditor.value = examples[index];
            codeEditor.focus();
            charCount.textContent = examples[index].length + '자';
            showOutput('예제를 로드했습니다. 컴파일 버튼을 누르세요.', 'success');
        }

        // 코드 지우기
        function clearCode() {
            if (confirm('정말로 코드를 지우시겠습니까?')) {
                codeEditor.value = '';
                output.textContent = '컴파일 결과가 여기에 표시됩니다...';
                charCount.textContent = '0자';
            }
        }

        // 출력 복사
        function copyOutput() {
            const text = output.innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('출력이 클립보드에 복사되었습니다!');
            });
        }

        // 초기 메시지
        window.addEventListener('load', () => {
            showOutput(`
🦎 FreeLiulia Playground에 오신 것을 환영합니다!

사용 방법:
1. 왼쪽에 FreeLiulia 코드를 입력합니다
2. '▶ 컴파일' 버튼을 누르면 코드가 분석됩니다
3. 오른쪽에 결과가 표시됩니다

🌟 특징:
- 한글 키워드 지원
- 문법 검사
- 변수 인식
- 실시간 피드백

💡 팁: 예제 버튼을 클릭하여 샘플 코드를 로드하세요!
            `, 'success');
        });

        // Ctrl+Enter로 컴파일
        codeEditor.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                compileCode();
            }
        });
    </script>
</body>
</html>
